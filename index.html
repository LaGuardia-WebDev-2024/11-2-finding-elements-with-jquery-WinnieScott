<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1 id="page-heading">All About Horses</h1>

    <p>All <span class="animal">horses</span> gallop on 4 legs.</p>

    <p>You can feed carrots to <span class="animal">horses</span>.</p>

    <p>Never walk behind <span class="animal">horses</span>.</p>

    <p>Their most notable body parts:</p>
    <ul>
      <li>Strong legs</li>
      <li>Long mane</li>
      <li>Hooved feet</li>
    </ul>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSusSw_ucHlBD_1rgv2gPy4bSpoxgQzc8ZDgw&s" width="200"><br>
     <button>makeitunicorn</button>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
    $("button").click(function () {
    $("li").text("horn");
    $("#page-heading").text("All About Unicorns");
    $(".animal").text("unicorns");
    $("img").attr("src","https://mcphee.com/cdn/shop/products/Rainbow-unicorn-mask.png?v=1665808507")
    });
    </script>
  </body>
</html>
